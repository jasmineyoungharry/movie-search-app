<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Movie Search App</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Main Container -->
    <main class="container">

        <!-- App Title -->
        <h1 class="app-title">Movie Search App</h1>

        <!-- Search Section -->
        <section class="search-section">

            <input
                type="text"
                id="movie-input"
                placeholder="Search for a movie..."
            />

            <button id="search-btn">
                Search
            </button>

        </section>

        <!-- Movie Result Section -->
        <section id="movie-container">

            <!-- Movie data will appear here dynamically -->

        </section>

    </main>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
